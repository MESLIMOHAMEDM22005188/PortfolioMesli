<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RSA Project Debug</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        img { width: 150px; margin: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Projet RSA – Debug</h1>
        <p>Si cette page s'affiche, le template fonctionne.</p>

        <div class="gallery">
            <img src="{% static 'assets/images/python.png' %}" alt="Python">
            <img src="{% static 'assets/images/crypto.png' %}" alt="RSA Diagram">
            <img src="{% static 'assets/images/keys.png' %}" alt="RSA Keys">
        </div>

        <p id="log-msg">Console debug activé...</p>
    </div>

    <script>
        console.log("✅ JS chargé correctement");
        try {
            console.log("🔹 Test variable:", window.someNonExistentVar);
        } catch(e) {
            console.error("Erreur JS détectée:", e);
        }

        document.addEventListener("DOMContentLoaded", () => {
            console.log("📄 DOMContentLoaded");
            const msg = document.getElementById("log-msg");
            if (msg) {
                msg.textContent += " | DOM ready!";
                console.log("Message affiché dans la page:", msg.textContent);
            }
        });

        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error("💥 JS Error:", msg, "at", lineNo + ":" + columnNo);
        };
    </script>
</body>
</html>
